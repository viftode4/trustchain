name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Run tests
        run: cargo test --workspace

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: trustchain-node-linux-x64
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: trustchain-node-linux-arm64
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: trustchain-node-macos-x64
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: trustchain-node-macos-arm64
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: trustchain-node-windows-x64
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protobuf compiler
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler + cross toolchain (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler gcc-aarch64-linux-gnu

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protobuf compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin trustchain-node

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/trustchain-node trustchain-node
          tar czf ${{ matrix.artifact }}.tar.gz trustchain-node

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/trustchain-node.exe trustchain-node.exe
          7z a ${{ matrix.artifact }}.zip trustchain-node.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            trustchain-node-linux-x64.tar.gz
            trustchain-node-linux-arm64.tar.gz
            trustchain-node-macos-x64.tar.gz
            trustchain-node-macos-arm64.tar.gz
            trustchain-node-windows-x64.zip
          generate_release_notes: true
